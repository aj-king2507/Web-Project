<!DOCTYPE html>
<html>
<head>
    <title>Appointments (AJAX)</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<h2>Appointments (Loaded with AJAX)</h2>

<table border="1" id="appointmentsTable">
    <tr>
        <th>Name</th>
        <th>Service</th>
        <th>Date</th>
    </tr>
</table>

<script>
$(document).ready(function() {
    $.ajax({
        url: "appointments.json",
        method: "GET",
        dataType: "json",
        success: function(data) {
            data.forEach(function(app) {
                $("#appointmentsTable").append(`
                    <tr>
                        <td>${app.customer_name}</td>
                        <td>${app.service}</td>
                        <td>${app.appointment_date}</td>
                    </tr>
                `);
            });
        },
        error: function() {
            alert("Failed to load JSON data");
        }
    });
});
</script>

</body>
</html>
